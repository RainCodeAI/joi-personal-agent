services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: joi
      POSTGRES_USER: joi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-joi_local}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joi -d joi"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://joi:${DB_PASSWORD:-joi_local}@db:5432/joi
      DB_PATH: /app/data/joi_v1.db
      AGENT_CHROMA_PATH: /app/data/index
      AGENT_CHROMA_COLLECTION: memories
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JOI_API_TOKEN: ${JOI_API_TOKEN:?Set JOI_API_TOKEN before starting Joi}
      AIRGAP: ${AIRGAP:-false}
      APP_ENV: ${APP_ENV:-production}
    volumes:
      - api_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health'); sys.exit(0 if r.status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_JOI_API_TOKEN: ${JOI_API_TOKEN:?Set JOI_API_TOKEN before starting Joi}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Server-side fetches go directly to the api container over the compose network
      API_BASE_URL: http://api:8000
      JOI_API_TOKEN: ${JOI_API_TOKEN:?Set JOI_API_TOKEN before starting Joi}
      NEXT_PUBLIC_JOI_API_TOKEN: ${JOI_API_TOKEN:?Set JOI_API_TOKEN before starting Joi}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  api_data:
